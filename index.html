<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Travel Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>

        body{
            margin: 0;
        }

        main{
            background-color: rgb(45, 163, 134, 0.1);
            margin: 0;
            box-shadow: 0 4px 24px rgba(33, 133, 71, 0.1);
        }

        footer{
            background-color: rgb(45, 163, 134, 0.2);
        }

        .main_title {
            margin-left: 350px;
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            font-weight: 700;
            font-style: normal;
            text-decoration: underline rgb(91, 182, 129);
        }

        header{
            display: flex;
            box-shadow: 0 4px 24px rgba(33, 133, 71, 0.2);
            flex-direction: row;
        }

        li{
            list-style: none;
        }

        a{
            text-decoration: none;
            color: rgb(0, 0, 0);
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            font-weight: 200;
            font-style: normal;
            box-shadow: 0 4px 24px rgba(33, 133, 71, 0.1);
            cursor: pointer;
        }

        nav ul{
            display: flex;
            gap: 40px;
            margin-left: 800px;
            margin-top: 25px;
        }

        .title{
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
            text-decoration: underline rgb(91, 182, 129);
            display: flex;
            justify-content: center;
        }

        button{
            cursor: pointer;
        }

        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgb(91, 182, 129, 0.2);
            z-index: 100;
            
        }

        .backdrop.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-30%, -50%);
            min-width: 400px;
            min-height: 200px;
            padding: 24px;
            background-color: #f2f2f2;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(33, 133, 71, 0.5);
           color: rgb(91, 182, 129);

        }
    </style>
</head>

<body>

    <header>
        <h2 class="main_title">NorthWay</h2>
        <nav>
            <ul>
                <li><a href="#">Головна</a></li>
                <li><a href="#">Відпустки</a></li>
                <li><a href="#">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section>
            <h2 class="title">Про нас</h2>
            <button data-modal-open>Відкрити</button>
        </section>

        <section>
            <h2 class="title">Напрямки</h2>
            <button data-modal-open2>Відкрити</button>
        </section>

        <section>
            <h2 class="title">Поради</h2>
            <button data-modal-open3>Відкрити</button>
        </section>

        <section>
            <h2 class="title">Контакти</h2>
            <button data-modal-open4>Відкрити</button>
        </section>

    </main>

    <footer>
        <p>© 2026</p>
    </footer>

    <!-- МОДАЛКИ -->

    <div class="backdrop is-hidden" data-modal>
        <div class="modal">
            <button data-modal-close>✕</button>
            <h2>Про нас</h2>
        </div>
    </div>

    <div class="backdrop is-hidden" data-modal2>
        <div class="modal">
            <button data-modal-close2>✕</button>
            <h2>Напрямки</h2>
        </div>
    </div>

    <div class="backdrop is-hidden" data-modal3>
        <div class="modal">
            <button data-modal-close3>✕</button>
            <h2>Поради</h2>
        </div>
    </div>

    <div class="backdrop is-hidden" data-modal4>
        <div class="modal">
            <button data-modal-close4>✕</button>
            <h2>Контакти</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
